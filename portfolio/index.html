    <script>
      // Prevent FOUC for dark mode
      (function () {
        var t = localStorage.getItem("theme");
        if (
          t === "dark" ||
          (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
